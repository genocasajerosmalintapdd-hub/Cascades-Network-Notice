<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Cascades</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22c55e;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #020617, #020617);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .card {
      background: rgba(17, 24, 39, 0.95);
      border-radius: 18px;
      padding: 28px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 6px;
    }

    p {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 18px 0;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 12px 0 20px;
      text-align: left;
      font-size: 0.9rem;
    }

    ul li {
      margin-bottom: 8px;
      padding-left: 20px;
      position: relative;
    }

    ul li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: bold;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #052e16;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    footer {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #6b7280;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Welcome to Cascades Network</h1>
    <p>You’re connecting to a secured local network.</p>

    <div class="divider"></div>

    <ul>
      <li>Authorized use only</li>
      <li>Activity may be monitored</li>
      <li>No illegal or abusive access</li>
    </ul>

    <form action="/connect" method="POST">
      <button type="submit">Accept & Continue</button>
    </form>

    <footer>
      Network Gateway • Powered by Geno Casajeros
    </footer>
    <footer>
      for Network Support Contact CP#0994-693-0735
    </footer>
  </div>
</body>
</html>
